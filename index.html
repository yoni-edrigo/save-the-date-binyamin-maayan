<!DOCTYPE html>
<html lang="he" dir="rtl" style="direction:rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Save the Date – Maayan & Binyamin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --phone-w: 300px;
      --phone-h: 600px;
      --border: 14px;
      --radius: 2.5rem;
      --inner-radius: 2rem;
      --glass-bg: rgba(255,255,255,0.13);
      --glass-border: rgba(255,255,255,0.35);
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.25);
      
      font-family : Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif
    }

    html, body { width: 100%; height: 100%; overflow: hidden; }

    .desktop-bg {
      position: fixed; inset: 0;
      background: url('https://cdn.jsdelivr.net/gh/yoni-edrigo/save-the-date-binyamin-maayan@77fa1d81a1adb7467b6f835965777e2900a6371a/binyamin%20%26%20maayan.png') center/cover no-repeat;
      filter: blur(18px) brightness(0.55);
      transform: scale(1.08);
      z-index: 0;
    }

    .stage {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 1;
    }

    /* ── Phone shell ── */
    .phone {
      position: relative;
      width: var(--phone-w);
      height: var(--phone-h);
      background: #1a1a1a;
      border-radius: var(--radius);
      border: var(--border) solid #2a2a2a;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.08);
    }
    .phone::before {
      content: '';
      position: absolute; top: 0; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 20px;
      background: #1a1a1a;
      border-radius: 0 0 1rem 1rem;
      z-index: 10;
    }
    .phone-btn-vol-up, .phone-btn-vol-dn, .phone-btn-power {
      position: absolute; background: #222; border-radius: 3px;
    }
    .phone-btn-vol-up  { left: calc(-1 * var(--border)); width: 3px; height: 46px; top: 110px; border-radius: 3px 0 0 3px; }
    .phone-btn-vol-dn  { left: calc(-1 * var(--border)); width: 3px; height: 46px; top: 164px; border-radius: 3px 0 0 3px; }
    .phone-btn-power   { right: calc(-1 * var(--border)); width: 3px; height: 64px; top: 132px; border-radius: 0 3px 3px 0; }

    .phone-screen {
      border-radius: var(--inner-radius);
      overflow: hidden;
      width: 100%; height: 100%;
      position: relative;
      background: url('https://cdn.jsdelivr.net/gh/yoni-edrigo/save-the-date-binyamin-maayan@77fa1d81a1adb7467b6f835965777e2900a6371a/binyamin%20%26%20maayan.png') center/cover no-repeat;
    }
    .phone-screen::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.28) 0%,
        rgba(0,0,0,0.10) 35%,
        rgba(0,0,0,0.55) 62%,
        rgba(0,0,0,0.82) 100%
      );
      z-index: 0;
    }

    /* ── Screen content ── */
    .screen-content {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding: 0 14px 18px;
      z-index: 1;
    }

    /* ── Locale switcher ── */
    .locale-bar {
      position: absolute;
      top: 28px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 0;
      direction: ltr;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      overflow: hidden;
      z-index: 20;
    }
    .locale-btn {
      padding: 5px 12px;
      font-size: 10px;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      border: none;
      background: transparent;
      transition: color 0.2s, background 0.2s;
      user-select: none;
    }
    .locale-btn.active {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }
    .locale-btn:hover:not(.active) { color: rgba(255,255,255,0.9); }

    /* ── Text ── */
    .event-label {
      font-family: 'Georgia', serif;
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      margin-bottom: 4px;
      text-align: center;
    }
    .event-title {
      font-family: 'Georgia', serif;
      font-size: 19px;
      color: #fff;
      text-align: center;
      line-height: 1.25;
      margin-bottom: 6px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .event-date {
      font-family: 'Georgia', serif;
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      margin-bottom: 3px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      text-align: center;
    }
    .event-location {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      display: flex; align-items: center; gap: 5px;
      margin-bottom: 14px;
      direction: ltr; /* pin icon always LTR */
    }
    .event-location svg { width:11px; height:11px; fill: rgba(255,255,255,0.7); flex-shrink:0; }

    .divider {
      width: 80%; height: 1px;
      background: rgba(255,255,255,0.2);
      margin-bottom: 12px;
    }
    .cal-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 10px;
      text-align: center;
    }

    /* ── Calendar buttons ── */
    .cal-buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
      width: 100%;
    }
    .cal-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 9px 10px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px) saturate(1.4);
      -webkit-backdrop-filter: blur(12px) saturate(1.4);
      border-radius: 14px;
      box-shadow: var(--glass-shadow);
      color: #fff;
      font-size: 11px;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    .cal-btn:hover  { background: rgba(255,255,255,0.22); transform: scale(1.03); }
    .cal-btn:active { transform: scale(0.97); }
    .cal-btn img, .cal-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── Mobile full-screen ── */
    @media (max-width: 480px) {
      .desktop-bg { display: none; }
      .stage { background: #000; height: 100dvh; }
      .phone { width: 100vw; height: 100dvh; border-radius: 0; border: none; box-shadow: none; }
      .phone-screen { border-radius: 0; }
      .phone::before, .phone-btn-vol-up, .phone-btn-vol-dn, .phone-btn-power { display: none; }
    }
  </style>
</head>
<body>

<div class="desktop-bg"></div>

<div class="stage">
  <div class="phone">
    <div class="phone-btn-vol-up"></div>
    <div class="phone-btn-vol-dn"></div>
    <div class="phone-btn-power"></div>

    <div class="phone-screen">

      <!-- Locale switcher -->
      <div class="locale-bar">
        <button class="locale-btn"        onclick="setLocale('ru')">РУ</button>
        <button class="locale-btn"        onclick="setLocale('en')">EN</button>
        <button class="locale-btn active" onclick="setLocale('he')">עב</button>
      </div>

      <div class="screen-content">
        <p  class="event-label"    id="txt-label"></p>
        <h1 class="event-title"    id="txt-title"></h1>
        <p  class="event-date"     id="txt-date"></p>
        <p  class="event-location">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/>
          </svg>
          <span id="txt-location"></span>
        </p>
        <div class="divider"></div>
        <p class="cal-label" id="txt-cal-label"></p>
        <div class="cal-buttons" id="calButtons"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── EVENT BASE (times, shared) ──────────────────────────────────
const EVENT_BASE = {
  startISO: "2026-08-23T18:00:00",
  endISO:   "2026-08-24T01:00:00",
  startUTC: "20260823T150000Z",
  endUTC:   "20260823T220000Z",
  startDT:  "20260823T180000",
  endDT:    "20260824T010000",
};

// ─── LOCALES ─────────────────────────────────────────────────────
const LOCALES = {
  he: {
    dir:         "rtl",
    lang:        "he",
    label:       "שמרו את התאריך",
    title:       "מעיין ובנימין",
    date:        "א׳, 23 באוגוסט 2026",
    location:    "עמק חפר, ישראל",
    calLabel:    "הוסיפו ליומן",
    eventTitle:  "חתונה – מעיין ובנימין",
    eventDesc:   "מוזמנים לחגוג איתנו את חתונת מעיין ובנימין!",
    eventLoc:    "עמק חפר, ישראל",
    cal: {
      google:  "גוגל",
      apple:   "אפל / ICS",
      outlook: "אאוטלוק",
    }
  },
  en: {
    dir:         "ltr",
    lang:        "en",
    label:       "Save the Date",
    title:       "Maayan & Binyamin",
    date:        "Sunday, 23 August 2026",
    location:    "Hefer Valley, Israel",
    calLabel:    "Add to your calendar",
    eventTitle:  "Wedding – Maayan & Binyamin",
    eventDesc:   "Join us to celebrate the wedding of Maayan & Binyamin!",
    eventLoc:    "Hefer Valley, Israel",
    cal: {
      google:  "Google",
      apple:   "Apple / ICS",
      outlook: "Outlook",
    }
  },
  ru: {
    dir:         "ltr",
    lang:        "ru",
    label:       "Сохраните дату",
    title:       "Маайан и Биньямин",
    date:        "Воскресенье, 23 августа 2026",
    location:    "Долина Хефер, Израиль",
    calLabel:    "Добавить в календарь",
    eventTitle:  "Свадьба – Маайан и Биньямин",
    eventDesc:   "Приглашаем вас на свадьбу Маайан и Биньямина!",
    eventLoc:    "Долина Хефер, Израиль",
    cal: {
      google:  "Google",
      apple:   "Apple / ICS",
      outlook: "Outlook",
    }
  },
};

// ─── Calendar URL builders ────────────────────────────────────────
const enc = encodeURIComponent;

function googleUrl(L)  {
  return `https://calendar.google.com/calendar/render?action=TEMPLATE`
    + `&text=${enc(L.eventTitle)}`
    + `&dates=${EVENT_BASE.startUTC}/${EVENT_BASE.endUTC}`
    + `&details=${enc(L.eventDesc)}`
    + `&location=${enc(L.eventLoc)}`
    + `&sf=true&output=xml`;
}
function outlookUrl(L) {
  return `https://outlook.live.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent`
    + `&subject=${enc(L.eventTitle)}`
    + `&startdt=${enc(EVENT_BASE.startISO)}`
    + `&enddt=${enc(EVENT_BASE.endISO)}`
    + `&location=${enc(L.eventLoc)}`
    + `&body=${enc(L.eventDesc)}`;
}
function triggerIcs(L) {
  const ics = [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//SaveTheDate//EN",
    "CALSCALE:GREGORIAN",
    "METHOD:PUBLISH",
    "BEGIN:VEVENT",
    `DTSTART;TZID=Asia/Jerusalem:${EVENT_BASE.startDT}`,
    `DTEND;TZID=Asia/Jerusalem:${EVENT_BASE.endDT}`,
    `SUMMARY:${L.eventTitle}`,
    `DESCRIPTION:${L.eventDesc}`,
    `LOCATION:${L.eventLoc}`,
    "STATUS:CONFIRMED",
    "END:VEVENT",
    "END:VCALENDAR"
  ].join("\r\n");
  const dataUri = "data:text/calendar;charset=utf-8," + encodeURIComponent(ics);
  const tmp = document.createElement("a");
  tmp.href = dataUri;
  tmp.download = "wedding-maayan-binyamin.ics";
  document.body.appendChild(tmp);
  tmp.click();
  document.body.removeChild(tmp);
}

// ─── Calendar button definitions (icons static, labels dynamic) ──
const CAL_KEYS = [
  {
    key: "google",
    icon: `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <rect width="48" height="48" rx="8" fill="#fff" opacity=".15"/>
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.07 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>`,
    getHref: (L) => googleUrl(L),
  },
  {
    key: "apple",
    isIcs: true,
    icon: `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <rect width="48" height="48" rx="8" fill="#fff" opacity=".15"/>
      <path fill="#fff" d="M33.2 25.4c0-4.4 3.6-6.5 3.8-6.6-2.1-3-5.3-3.4-6.4-3.5-2.7-.3-5.3 1.6-6.7 1.6-1.4 0-3.5-1.5-5.7-1.5-2.9.1-5.6 1.7-7.1 4.3-3.1 5.3-.8 13.2 2.2 17.5 1.5 2.1 3.2 4.5 5.5 4.4 2.2-.1 3.1-1.4 5.7-1.4 2.7 0 3.5 1.4 5.8 1.4 2.4 0 3.9-2.1 5.3-4.3 1.7-2.4 2.4-4.8 2.4-4.9-.1 0-4.8-1.8-4.8-7z"/>
      <path fill="#fff" d="M28.5 11.5c1.2-1.5 2-3.5 1.8-5.5-1.7.1-3.8 1.2-5.1 2.6-1.1 1.3-2.1 3.3-1.8 5.3 1.9.1 3.8-1 5.1-2.4z"/>
    </svg>`,
  },
  {
    key: "outlook",
    icon: `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <rect width="48" height="48" rx="8" fill="#fff" opacity=".15"/>
      <path fill="#0072C6" d="M4 10a2 2 0 0 1 2-2h36a2 2 0 0 1 2 2v28a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V10z"/>
      <path fill="#fff" d="M44 10l-20 12L4 10h40z" opacity=".9"/>
      <ellipse cx="15" cy="27" rx="7" ry="8.5" fill="#fff"/>
      <ellipse cx="15" cy="27" rx="5" ry="6.5" fill="#0072C6"/>
    </svg>`,
    getHref: (L) => outlookUrl(L),
  },
];

// ─── Render ───────────────────────────────────────────────────────
let currentLocale = "he";

function renderButtons(L) {
  const container = document.getElementById("calButtons");
  container.innerHTML = "";
  CAL_KEYS.forEach(cal => {
    const a = document.createElement("a");
    a.className = "cal-btn";
    a.innerHTML = cal.icon + `<span>${L.cal[cal.key]}</span>`;
    if (cal.isIcs) {
      a.href = "#";
      a.addEventListener("click", e => { e.preventDefault(); triggerIcs(L); });
    } else {
      a.href = cal.getHref(L);
      a.target = "_blank";
      a.rel = "noopener noreferrer";
    }
    container.appendChild(a);
  });
}

function setLocale(code) {
  currentLocale = code;
  const L = LOCALES[code];
  document.documentElement.lang = L.lang;

  document.getElementById("txt-label").textContent    = L.label;
  document.getElementById("txt-title").textContent    = L.title;
  document.getElementById("txt-date").textContent     = L.date;
  document.getElementById("txt-location").textContent = L.location;
  document.getElementById("txt-cal-label").textContent = L.calLabel;

  // active button
    document.querySelectorAll(".locale-btn").forEach((btn, i) => {
    btn.classList.toggle("active", ["ru","en","he"][i] === code);
  });

  renderButtons(L);
}

// Init with Hebrew
setLocale("he");
</script>
</body>
</html>
